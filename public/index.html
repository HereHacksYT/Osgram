<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsGram - Reels</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .reels-container {
            width: 100%;
            max-width: 450px; 
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; 
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }
        .reels-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .reels-overlay {
            position: absolute;
            bottom: 50px;
            left: 15px;
            right: 70px;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none; /* Yazılara tıklayınca videoyu engellemesin */
        }
        .reels-overlay h3 {
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .reels-overlay p {
            font-size: 14px;
            line-height: 1.4;
            opacity: 0.9;
        }
        /* Ortadaki Oynat Butonu Stili */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.2s ease;
            pointer-events: none; /* Tıklamayı karta geçirir */
        }
        .play-button::before {
            content: '';
            display: block;
            box-sizing: border-box;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent #fff;
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <div class="reels-container">
        </div>

    <script src="script.js"></script>
</body>
</html>
