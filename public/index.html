<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsGram - Reels</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .reels-container {
            width: 100%;
            max-width: 450px; 
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; 
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }
        .reels-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }
        /* Yatay videoları bile zorla tam ekran dikey yapan sihirli kod */
        video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important; 
        }
        .reels-overlay {
            position: absolute;
            bottom: 50px;
            left: 15px;
            right: 70px;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }
        .reels-overlay h3 {
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .reels-overlay p {
            font-size: 14px;
            line-height: 1.4;
            opacity: 0.9;
        }
        .mute-warning {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="reels-container">
        <!-- Videolar buraya gelecek -->
    </div>
    <script src="script.js"></script>
</body>
</html>
