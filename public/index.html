<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin:0; padding:0; background:#000; overflow:hidden; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .card { height: 100vh; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info { position: absolute; bottom: 20px; left: 10px; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="reels-container" id="container"></div>
    <script src="script.js"></script>
</body>
</html>
